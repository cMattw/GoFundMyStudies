<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse - GoFundMyStudies</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        .btn-create {
            background-color: var(--color-secondary);
            color: var(--color-dark);
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .btn-create:hover {
            background-color: var(--color-secondary-dark);
            color: var(--color-light);
        }

        .content-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 30px;
            padding: 40px;
            max-width: 1400px;
            margin: 80px auto 0;
        }

        .empty-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 20px;
            background-color: var(--color-surface);
            border-radius: 12px;
            border: 2px dashed #ccc;
        }

        .empty-message h2 {
            color: var(--color-dark);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .mini-card {
            background-color: var(--color-light);
            border-radius: 12px;
            display: flex;
            flex-direction: column; 
            gap: 20px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .mini-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .picture-placeholder {
            background-color: var(--color-muted);
            width: 100%;
            height: 250px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            background-color: var(--color-primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .profile-details h2 {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .profile-details .author-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-primary);
            margin-bottom: 2px;
        }

        .profile-details .author-org {
            color: #888;
            font-size: 0.82rem;
        }

        .profile-details p {
            color: #666;
            font-size: 1rem;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-bar-wrap {
            background-color: var(--color-border);
            border-radius: 999px;
            height: 8px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            background-color: var(--color-primary);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--color-muted);
        }

        .progress-labels .raised-amt {
            font-weight: 700;
            color: var(--color-primary);
        }

        .deadline-tag {
            font-size: 0.78rem;
            color: var(--color-muted);
        }

        .deadline-tag span {
            font-weight: 600;
            color: var(--color-dark);
        }

        @media (max-width: 500px) {
            .header {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 15px;
            }

            .btn-create {
                padding: 6px 12px;
                font-size: 0.82rem;
                border-radius: 6px;
                white-space: nowrap;
            }

            .content-container {
                grid-template-columns: 1fr;
                padding: 20px 15px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><a href="index.html" style="color:inherit;text-decoration:none;">GoFundMyStudies</a></h1>
        <a href="create-post.html" class="btn-create">+ Create a Post</a>
    </div>

    <main class="content-container" id="contentContainer">
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('contentContainer');

            // Load saved posts and users from localStorage
            let posts = JSON.parse(localStorage.getItem('studyPosts')) || [];
            const users = JSON.parse(localStorage.getItem('users')) || [];

            // Build a quick lookup map
            const userMap = {};
            users.forEach(u => { userMap[u.username.toLowerCase()] = u; });

            // If there are no posts, show a placeholder message
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-message">
                        <h2>No posts yet.</h2>
                        <p>Be the first to start a campaign to fund your studies!</p>
                    </div>
                `;
            } else {
                // Loop through each post and build a card HTML string
                let cardsHTML = '';
                posts.forEach(post => {
                    // Use the post image as a background if it exists
                    const imageStyle = post.image 
                        ? `background-image: url('${post.image}');` 
                        : '';

                    // Look up author details using the userMap
                    const authorUser = userMap[(post.author || '').toLowerCase()];
                    const authorName = post.author || 'Unknown';
                    const authorOrg  = authorUser ? authorUser.org : '';

                    // Get the first letter of the author's name for the avatar circle
                    const initial = authorName.charAt(0).toUpperCase();

                    // Build each card as a link to the post's details page
                    // Build progress bar data
                    const raised = Number(post.totalRaised || 0);
                    const target = Number(post.targetAmount || 0);
                    const pct = target > 0 ? Math.min(100, (raised / target) * 100).toFixed(1) : null;

                    // Build deadline display
                    let deadlineHTML = '';
                    if (post.endDate) {
                        const end = new Date(post.endDate + 'T00:00:00');
                        const now = new Date();
                        const diffDays = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
                        const dateStr = end.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });
                        const daysLabel = diffDays > 0 ? `${diffDays} day${diffDays !== 1 ? 's' : ''} left` : 'Ended';
                        deadlineHTML = `<p class="deadline-tag">Ends <span>${dateStr}</span> · ${daysLabel}</p>`;
                    }

                    // Build progress bar HTML
                    let progressHTML = '';
                    if (pct !== null) {
                        progressHTML = `
                            <div class="card-meta">
                                <div class="progress-bar-wrap">
                                    <div class="progress-bar-fill" style="width: ${pct}%"></div>
                                </div>
                                <div class="progress-labels">
                                    <span class="raised-amt">₱${raised.toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2})} raised</span>
                                    <span>of ₱${target.toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2})} goal</span>
                                </div>
                                ${deadlineHTML}
                            </div>`;
                    } else if (deadlineHTML) {
                        progressHTML = `<div class="card-meta">${deadlineHTML}</div>`;
                    }

                    cardsHTML += `
                        <a href="post-details.html?id=${post.id}" class="mini-card">
                            <div class="picture-placeholder" style="${imageStyle}"></div>
                            <div class="profile-section">
                                <div class="avatar-circle">${initial}</div>
                                <div class="profile-details">
                                    <h2>${post.title}</h2>
                                    <p class="author-name">${authorName}${authorOrg ? ` · <span class="author-org">${authorOrg}</span>` : ''}</p>
                                    <p>${post.details}</p>
                                </div>
                            </div>
                            ${progressHTML}
                        </a>
                    `;
                });

                // Inject all generated cards into the page
                container.innerHTML = cardsHTML;
            }
        });
    </script>

</body>
</html>

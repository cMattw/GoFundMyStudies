<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .header {
            padding: 20px 40px;
            border-bottom: 2px solid #cccccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-create {
            background-color: #555555;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .btn-create:hover {
            background-color: #333333;
        }

        .content-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            margin-top: 70px;
        }

        .content-container.empty-state {
            grid-template-columns: 1fr;
        }

        .feature-card {
            grid-column: 1;
            grid-row: 1 / span 2;
            
            background-color: var(--color-surface, #bdbdbd);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .content-container.empty-state .feature-card {
            grid-column: auto;
            grid-row: auto;
        }

        .feature-card:hover, .feature-card:focus {
            outline: none;
            background-color: #b0b0b0;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .mini-card {
            background-color: var(--color-surface, #e0e0e0);
            border-radius: 20px;
            display: flex;
            flex-direction: column; 
            gap: 15px;
            padding: 20px; 
            text-align: left;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .mini-card:hover, .mini-card:focus {
            outline: none;
            background-color: #d5d5d5;
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.12);
        }

        .picture-placeholder {
            background-color: #555555;
            width: 100%;
        }

        .feature-card .picture-placeholder {
            height: 280px;
        }

        .mini-card .picture-placeholder {
            height: 120px; 
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-circle {
            background-color: #757575;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .feature-card .avatar-circle {
            width: 60px;
            height: 60px;
        }

        .mini-card .avatar-circle {
            width: 40px; 
            height: 40px;
        }

        .profile-details h2 {
            font-weight: normal;
            margin-bottom: 4px;
        }

        .feature-card .profile-details h2 {
            font-size: 1.1rem;
        }

        .mini-card .profile-details h2 {
            font-size: 0.95rem; 
        }

        .profile-details p {
            color: #444444;
        }

        .feature-card .profile-details p {
            font-size: 0.95rem;
        }

        .mini-card .profile-details p {
            font-size: 0.85rem; 
        }

        @media (max-width: 950px) {
            .content-container, .content-container.empty-state {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .feature-card {
                grid-column: auto;
                grid-row: auto;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>GoFundMyStudies</h1>
        <a href="create-post.html" class="btn-create">+ Create a Post</a>
    </div>

    <main class="content-container" id="contentContainer">
        
        <a href="#" class="feature-card" id="featureCard">
            <div class="picture-placeholder"></div>
            <div class="profile-section">
                <div class="avatar-circle"></div>
                <div class="profile-details">
                    <h2>Feature Card Title</h2>
                    <p>Feature details</p>
                </div>
            </div>
        </a>
        
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('contentContainer');
            const featureCard = document.getElementById('featureCard');
            let posts = JSON.parse(localStorage.getItem('studyPosts')) || [];

            if (posts.length === 0) {
                container.classList.add('empty-state');
            } else {
                container.classList.remove('empty-state');
                
                let cardsHTML = '';
                posts.forEach(post => {
                    cardsHTML += `
                        <a href="#" class="mini-card">
                            <div class="picture-placeholder"></div>
                            <div class="profile-section">
                                <div class="avatar-circle"></div>
                                <div class="profile-details">
                                    <h2>${post.title}</h2>
                                    <p>${post.details}</p>
                                </div>
                            </div>
                        </a>
                    `;
                });

                featureCard.insertAdjacentHTML('afterend', cardsHTML);
            }
        });
    </script>

</body>
</html>

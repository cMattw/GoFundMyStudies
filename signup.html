<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Centered</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            overflow: hidden;
            background-image: url(./assets/bg.jpg);
                background-size: cover;
                background-position: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .form-wrapper {
            background-color: var(--color-light);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            text-align: center;
            display: none;
        }

        .container.sign-in-mode .sign-in-form,
        .container.sign-up-mode .sign-up-form {
            display: block;
        }

        h2 {
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            background-color: var(--color-input);
            border-radius: 0.5rem;
            border: 2px solid transparent;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--color-primary);
        }

        button {
            cursor: pointer;
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--color-secondary);
            color: var(--color-dark);
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--color-secondary-dark);
        }

        p {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .pointer {
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="index.html" style="
        position: fixed;
        top: 20px;
        left: 24px;
        color: rgba(255,255,255,0.85);
        font-size: 0.9rem;
        font-weight: bold;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 10;
        transition: color 0.2s;
    " onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.85)'">
        ← Home
    </a>

    <div id="container" class="container sign-in-mode">
        
        <div class="form-wrapper sign-in-form">
            <h2>Welcome</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="text" id="loginOrg" placeholder="Organization" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                
                <div id="loginError" class="error-message" style="color: red; margin-bottom: 1rem; display: none;"></div>

                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <span class="pointer" onclick="toggle()">Sign up here</span></p>
        </div>

        <div class="form-wrapper sign-up-form">
            <h2>Join Us</h2>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <input type="text" id="signupUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="text" id="signupOrg" placeholder="Organization" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Your @cvsu.edu.ph email" pattern="[a-zA-Z0-9._%+-]+@cvsu\.edu\.ph$" title="Please use your official @cvsu.edu.ph email address." required>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password" required>
                </div>
                
                <div id="signupError" class="error-message" style="color: red; margin-bottom: 1rem; display: none;"></div>

                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <span class="pointer" onclick="toggle()">Sign in here</span></p>
        </div>

    </div>

    <script>
        const container = document.getElementById('container');

        // Toggle between the Sign In and Sign Up forms
        function toggle() {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';

            if (container.classList.contains('sign-in-mode')) {
                container.classList.remove('sign-in-mode');
                container.classList.add('sign-up-mode');
            } else {
                container.classList.remove('sign-up-mode');
                container.classList.add('sign-in-mode');
            }
        }

        // Handle the Sign Up form submission
        function handleSignup(event) {
            event.preventDefault(); 

            const username = document.getElementById('signupUsername').value.trim();
            const org = document.getElementById('signupOrg').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            
            const signupError = document.getElementById('signupError');
            signupError.style.display = 'none';

            // Reject passwords shorter than 8 characters
            if (password.length < 8) {
                signupError.style.color = "red";
                signupError.textContent = "Password must be at least 8 characters long.";
                signupError.style.display = 'block';
                return;
            }

            // CvSU Email Domain Verification Validation
            if (!email.toLowerCase().endsWith('@cvsu.edu.ph')) {
                signupError.style.color = "red";
                signupError.textContent = "Access restricted. You must register with a @cvsu.edu.ph email address.";
                signupError.style.display = 'block';
                return;
            }

            // Check if the username is already taken
            const existingUsers = JSON.parse(localStorage.getItem('users')) || [];
            const userExists = existingUsers.some(user => user.username.toLowerCase() === username.toLowerCase());

            if (userExists) {
                signupError.style.color = "red";
                signupError.textContent = "This username is already taken. Please choose another one.";
                signupError.style.display = 'block';
                return;
            }

            // Save the new user to localStorage and switch to the Sign In form
            const newUser = { username, org, email, password };
            existingUsers.push(newUser);
            localStorage.setItem('users', JSON.stringify(existingUsers));

            document.getElementById('signupForm').reset();
            toggle();
            
            // Show a success message on the Sign In form
            const loginError = document.getElementById('loginError');
            loginError.style.color = "green";
            loginError.textContent = "Account created successfully! Please sign in.";
            loginError.style.display = 'block';
        }

        // Handle the Sign In form submission
        function handleLogin(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('loginUsername').value.trim();
            const orgInput = document.getElementById('loginOrg').value.trim();
            const passwordInput = document.getElementById('loginPassword').value;
            
            const loginError = document.getElementById('loginError');
            loginError.style.display = 'none';

            // Look through saved users for a matching username, organization, and password
            const existingUsers = JSON.parse(localStorage.getItem('users')) || [];
            const foundUser = existingUsers.find(user => 
                user.username.toLowerCase() === usernameInput.toLowerCase() && 
                user.org.toLowerCase() === orgInput.toLowerCase() &&
                user.password === passwordInput
            );

            if (foundUser) {
                // Save the logged-in user to localStorage and redirect to the home page
                localStorage.setItem('currentUser', JSON.stringify(foundUser));
                window.location.href = "index.html";
            } else {
                // Show an error if no matching user was found
                loginError.style.color = "red";
                loginError.textContent = "Invalid username, organization, or password. Please try again.";
                loginError.style.display = 'block';
            }
        }
    </script>
</body>
</html>

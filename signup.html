<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Centered</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Simple background without the moving circle */
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            overflow: hidden;
            background-image: url(./assets/bg.jpg);
                background-size: cover;
                background-position: center;
        }

        .container {
            width: 100%;
            max-width: 400px; /* Limits form width */
            padding: 20px;
        }

        /* Form Styling */
        .form-wrapper {
            background-color: var(--color-light);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
            text-align: center;
            display: none; /* Hidden by default */
        }

        /* Show the correct form based on parent class */
        .container.sign-in-mode .sign-in-form,
        .container.sign-up-mode .sign-up-form {
            display: block;
        }

        h2 {
            color: var(--color-primary);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            background-color: var(--color-input);
            border-radius: 0.5rem;
            border: 2px solid transparent;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--color-primary);
        }

        button {
            cursor: pointer;
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--color-secondary);
            color: var(--color-dark);
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--color-secondary-dark);
        }

        p {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .pointer {
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="container" class="container sign-in-mode">
        
        <!-- SIGN IN FORM -->
        <div class="form-wrapper sign-in-form">
            <h2>Welcome</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <span class="pointer" onclick="toggle()">Sign up here</span></p>
        </div>

        <!-- SIGN UP FORM -->
        <div class="form-wrapper sign-up-form">
            <h2>Join Us</h2>
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <input type="text" id="signupUsername" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="email" id="signupEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="signupPassword" placeholder="Password" required>
                </div>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <span class="pointer" onclick="toggle()">Sign in here</span></p>
        </div>

    </div>

    <script>
        const container = document.getElementById('container');

// toggle function
function toggle() {
    if (container.classList.contains('sign-in-mode')) {
        container.classList.remove('sign-in-mode');
        container.classList.add('sign-up-mode');
    } else {
        container.classList.remove('sign-up-mode');
        container.classList.add('sign-in-mode');
    }
}

// Handle User Registration (Sign Up)
function handleSignup(event) {
    event.preventDefault(); // Prevents the page from refreshing

    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    // Basic Validation
    if (password.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
    }

    // Check if user already exists in localStorage
    const existingUsers = JSON.parse(localStorage.getItem('users')) || [];
    const userExists = existingUsers.some(user => user.username.toLowerCase() === username.toLowerCase());

    if (userExists) {
        alert("This username is already taken. Please choose another one.");
        return;
    }

    // Save user object
    const newUser = { username, email, password };
    existingUsers.push(newUser);
    localStorage.setItem('users', JSON.stringify(existingUsers));

    alert("Registration successful! You can now log in.");
    
    // Clear registration fields and switch back to Sign In mode
    document.getElementById('signupForm').reset();
    toggle(); 
}

// Handle User Authentication (Sign In)
function handleLogin(event) {
    event.preventDefault(); // Prevents the page from refreshing

    const usernameInput = document.getElementById('loginUsername').value.trim();
    const passwordInput = document.getElementById('loginPassword').value;

    // Get users from localStorage
    const existingUsers = JSON.parse(localStorage.getItem('users')) || [];

    // Find matching user credentials
    const foundUser = existingUsers.find(user => 
        user.username.toLowerCase() === usernameInput.toLowerCase() && 
        user.password === passwordInput
    );

    if (foundUser) {
        alert(`Welcome back, ${foundUser.username}! Redirecting to homepage...`);
        
        // Store current session state
        localStorage.setItem('currentUser', JSON.stringify(foundUser));
        
        // Redirect to index.html (Main home page)
        window.location.href = "index.html";
    } else {
        alert("Invalid username or password. Please try again.");
    }
}
    </script>
</body>
</html>
